name: Price Monitor

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run price monitor
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          ALERT_EMAIL: pokedash.tcg@gmail.com
        run: python monitor.py

      - name: Commit and push updated data
        run: |
          git config user.name "price-monitor-bot"
          git config user.email "actions@github.com"
          git add data/ docs/
          git diff --staged --quiet || git commit -m "prices: update $(date -u +%Y-%m-%dT%H:%M)"
          git push
